<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>《野火》特效製作分析 - V23</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        :root {
            --bg-color: #121212; --card-bg: #1e1e1e; --text-color: #e0e0e0;
            --accent-blue: #3498db; --accent-green: #2ecc71; --accent-red: #e74c3c;
            --accent-orange: #f39c12; --accent-purple: #9b59b6;
        }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; scroll-behavior: smooth;}
        .container { max-width: 1400px; margin: auto; }
        
        /* 標題區塊樣式 */
        header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 30px; }
        .title-group h2 { font-size: 14px; color: #888; margin: 0; font-weight: normal; letter-spacing: 1px; }
        .title-group h1 { font-size: 32px; color: white; margin: 5px 0 0 0; font-weight: bold; }
        
        /* 版本切換下拉選單 */
        .version-select { background: #2a2a2a; color: var(--accent-green); border: 1px solid #444; padding: 10px 15px; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; outline: none; margin-top: 15px; }
        
        /* 分頁切換按鈕 */
        .tabs { display: flex; gap: 10px; margin-top: 10px; }
        .tab-btn { padding: 12px 24px; cursor: pointer; background: #2a2a2a; border: 2px solid transparent; color: #aaa; border-radius: 8px; font-weight: bold; transition: 0.3s; font-size: 15px;}
        .tab-btn.active { color: white; border-color: rgba(255,255,255,0.8); transform: translateY(-3px); }
        
        /* KPI 卡片區 */
        .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: var(--card-bg); padding: 25px; border-radius: 12px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .kpi-value { font-size: 32px; font-weight: bold; color: var(--accent-green); display: block; margin: 10px 0;}
        .kpi-label { color: #888; font-size: 14px;}
        .kpi-note { font-size: 12px; color: #aaa; margin-top: 10px; line-height: 1.4; display: block; text-align: left; }
        
        /* 表格與篩選器樣式 */
        .filter-section { background: #2a2a2a; padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 15px; }
        .chk-btn { display: inline-block; padding: 6px 14px; background: #333; border: 1px solid #555; border-radius: 20px; font-size: 13px; cursor: pointer; margin-right: 5px; transition: 0.2s;}
        .chk-btn.active { background: var(--accent-blue); border-color: var(--accent-blue); color: white; font-weight: bold; }
        .table-outer-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .table-scroll-area { max-height: 600px; overflow-y: auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; text-align: left; }
        th, td { padding: 16px 20px; border-bottom: 1px solid #333; font-size: 14px; }
        th { background-color: #252525; color: var(--accent-blue); position: sticky; top: 0; z-index: 10; }
        
        /* 讀取中遮罩 */
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; display: none; justify-content: center; align-items: center; color: white; flex-direction: column; }
        .spinner { border: 5px solid #333; border-top: 5px solid var(--accent-blue); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <div>正在與雲端 Excel 同步數據...</div>
    </div>

    <div class="container" id="main-content">
        <header>
            <div class="title-group">
                <h2>夢想特效分析表</h2>
                <h1>《野火》</h1>
                
                <select id="versionDropdown" class="version-select" onchange="fetchCloudData(this.value)">
                    <option value="v4" selected>🟢 V4 (0419 最新版)</option>
                    <option value="v3">⚪ V3 (歷史版本預留)</option>
                </select>
            </div>
            
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('heavy', this)" style="background:#3498db; color:white;">大幅度減齡方案</button>
                <button class="tab-btn" onclick="switchTab('smooth', this)">2D磨皮減齡方案</button>
                <button class="tab-btn" onclick="switchTab('actor', this)">演員方案 (移除減齡)</button>
                <button class="tab-btn" onclick="switchTab('list', this)">完整鏡頭清單</button>
            </div>
        </header>

        <div id="dashboard-view">
            <div class="kpi-grid">
                <div class="kpi-card"><span class="kpi-label">總預算 (TWD)</span><span class="kpi-value" id="kpi-budget">$0</span></div>
                <div class="kpi-card"><span class="kpi-label">總鏡頭數</span><span class="kpi-value" id="kpi-shots" style="color:var(--accent-blue);">0 顆</span></div>
                <div class="kpi-card">
                    <span class="kpi-label">預估人天</span>
                    <span class="kpi-value" id="kpi-days" style="color:var(--accent-purple);">0 天</span>
                    <span class="kpi-note">＊註：此人天數為依難度折算之基準單位，非實際製作時程。</span>
                </div>
                <div class="kpi-card"><span class="kpi-label">單顆平均成本</span><span class="kpi-value" id="kpi-avg" style="color:var(--accent-orange);">$0</span></div>
            </div>
            
            </div>

        <div id="table-view" style="display:none;">
            <div class="filter-section" id="filter-container">
                </div>
            
            <div class="table-outer-card">
                <div class="table-scroll-area">
                    <table id="shot-table">
                        <thead>
                            <tr><th>集數</th><th>類別</th><th>場景</th><th>劇時間</th><th>內容描述</th><th>VFX內容</th><th>數量</th><th>等級</th><th>備註</th></tr>
                        </thead>
                        <tbody id="table-body">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ---【網址與參數配置區】---
        // 如果你的 Google Sheets 連結有變，改這裡就好
        const URL_V4 = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT31rcOANdpsGCUZ-S2_4OcK0v4ebHrRqTwJBlXJPNs7UzdhKJSNwAS4GxF-Y3LWg/pub?output=csv";
        const URL_V3 = ""; 

        // 報價單價與難度對應表
        const costMap = { 'S': 65000, '★★★★★': 45500, '★★★★': 32500, '★★★': 19500, '★★': 13000, '★': 6500 };
        const daysMap = { 'S': 10, '★★★★★': 7, '★★★★': 5, '★★★': 3, '★★': 2, '★': 1 };

        let allData = []; // 存放從雲端抓下來的原生資料
        let currentTab = 'heavy';

        // ---【核心功能 1：抓取雲端資料】---
        function fetchCloudData(version) {
            let url = (version === 'v4') ? URL_V4 : URL_V3;
            if (!url) return alert("尚未設定該版本的網址！");

            document.getElementById('loadingOverlay').style.display = 'flex';

            Papa.parse(url, {
                download: true,
                header: true, // 自動抓取第一列作為標題
                skipEmptyLines: true,
                complete: function(results) {
                    allData = results.data.map(row => ({
                        // 這裡精準對應你的 Excel 標題
                        ep: (row['集數'] || '').trim(),
                        cat: (row['特效類別'] || '').trim(),
                        scene: (row['大場景'] || '').trim(),
                        time: (row['劇時間'] || '').trim(),
                        content: (row['內容'] || '').trim(),
                        vfx: (row['VFX內容'] || '').trim(),
                        count: parseInt(row['鏡頭數量']) || 0,
                        level: (row['鏡頭等級'] || '').trim(),
                        remark: (row['備註'] || '').trim()
                    })).filter(item => item.cat !== ""); // 過濾掉沒填類別的空行
                    
                    document.getElementById('loadingOverlay').style.display = 'none';
                    updateUI(); // 抓完資料立刻更新畫面
                }
            });
        }

        // ---【核心功能 2：更新畫面數據】---
        function updateUI() {
            // 這裡撰寫計算邏輯 (Plan A, B, C)
            let totalBudget = 0, totalShots = 0, totalDays = 0;
            
            allData.forEach(item => {
                let star = item.level;
                // 如果是方案 B (Smooth) 且是減齡類，強制降為 2 星
                if (currentTab === 'smooth' && item.cat.includes('減齡')) star = '★★';
                // 如果是方案 C (Actor) 且是減齡類，跳過不計
                if (currentTab === 'actor' && item.cat.includes('減齡')) return;

                totalBudget += (item.count * (costMap[star] || 0));
                totalShots += item.count;
                totalDays += (item.count * (daysMap[star] || 0));
            });

            // 更新 KPI 文字
            document.getElementById('kpi-budget').innerText = '$' + totalBudget.toLocaleString();
            document.getElementById('kpi-shots').innerText = totalShots + ' 顆';
            document.getElementById('kpi-days').innerText = totalDays.toLocaleString() + ' 天';
            document.getElementById('kpi-avg').innerText = '$' + Math.round(totalBudget / (totalShots || 1)).toLocaleString();

            renderTable();
        }

        // ---【核心功能 3：渲染表格清單】---
        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = allData.map(item => `
                <tr>
                    <td>${item.ep}</td>
                    <td>${item.cat}</td>
                    <td>${item.scene}</td>
                    <td>${item.time}</td>
                    <td style="max-width:300px">${item.content}</td>
                    <td>${item.vfx}</td>
                    <td>${item.count}</td>
                    <td>${item.level}</td>
                    <td>${item.remark}</td>
                </tr>
            `).join('');
        }

        // ---【介面切換邏輯】---
        function switchTab(type, btn) {
            currentTab = type;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if (type === 'list') {
                document.getElementById('dashboard-view').style.display = 'none';
                document.getElementById('table-view').style.display = 'block';
            } else {
                document.getElementById('dashboard-view').style.display = 'block';
                document.getElementById('table-view').style.display = 'none';
                updateUI();
            }
        }

        // 頁面開啟時自動執行一次抓取
        fetchCloudData('v4');
    </script>
</body>
</html>
